name: CI

on:
  push:
    branches:
      - "*"
  pull_request:
    branches:
      - "*"

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: lts/*
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check types
        run: pnpm run check-types

      - name: Run Prettier
        run: pnpm run format

      - name: Run Knip and ESLint
        run: |
          set +e
          pnpm exec knip
          knip_exit_code=$?
          set -e

          if [ "$knip_exit_code" -eq 1 ] || [ "$knip_exit_code" -eq 2 ]; then
            exit "$knip_exit_code"
          fi

          pnpm exec eslint .

      - name: Run tests
        run: pnpm run test
