name: CI

on:
  push:
    branches:
      - "*"
  pull_request:
    branches:
      - "*"

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: lts/*

      - name: Install pnpm
        run: npm install --global pnpm@11.12.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check types
        run: pnpm run check-types

      - name: Run formatter
        run: pnpm run format

      - name: Run linters
        run: |
          set +e
          pnpm exec knip
          knip_exit_code=$?
          set -e

          if [ "$knip_exit_code" -eq 1 ] || [ "$knip_exit_code" -eq 2 ]; then
            exit "$knip_exit_code"
          fi

          pnpm exec eslint .

      - name: Run tests
        run: pnpm run test
